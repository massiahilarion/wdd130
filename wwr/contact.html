<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <meta name="description"
      content="Here we take you on a rafting thrilling trip made for family and fun seekers.">
    <meta name="author" content="Sunday Isaac Udoh">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <a href="#" class="logo-link">
            <img src="images/logo.png" alt="White Water Rafting" class="logo">
        </a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <section class="company-info">
        <h1>White Water Rafting Company</h1>
        <p>Lagos Island</p>
        <p>Lagos, Nigeria</p>
        <p>+2349117518905</p>
        <p>info@whitewater.com</p>
    </section>

    <section class="contact-split-container">
        <!--left side: Map Box-->
        <div class="map-column">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d6034.167093639187!2d-75.80193836827293!3d40.87004068778569!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1781275332189!5m2!1sen!2sng"
              width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
            <div class="map-pin"></div>
        </div>

        <!--Right Side: Form-Column-->
        <div class="form-column">
            <form action="#" class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Your Email">
                </div>
                <div class="form-group radio-group">
                    <label>Message Purpose</label>
                    <div class="radio-options">
                        <label><input type="radio" name="purpose" checked> General Inquiry</label>
                        <label><input type="radio" name="purpose"> Reservation Question</label>
                        <label><input type="radio" name="purpose"> Website Suggestion</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="4" placeholder="Type here"></textarea>
                </div>
                <div class="form-group checkbox-group">
                    <label><input type="checkbox" checked> Please Subscribe me to the monthly
                        newsletter</label>
                </div>
                <button type="submit" class="submit-btn">Get in Touch!</button>
            </form>
        </div>
    </section>

    <section class="employee-section">
        <h2>We Are Here to Serve You</h2>
        <div class="employee-grid">
            <div class="profile-card">
                <img src="images/profile1 (1).png" alt="Profile Icon" width="50">
                <p>Employee profile</p>
            </div>
            <div class="profile-card">
                <img src="images/profile1 (2).png" alt="Profile Icon" width="50">
                <p>Employee profile</p>
            </div>
            <div class="profile-card">
                <img src="images/profile1 (3).png" alt="Profile Icon" width="50">
                <p>Employee profile</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy;2026 Sunday Isaac Udoh</p>
        <div class="footer-text"></div>
        <div class="social-icons">
            <a href="https://whatsapp.com">
                <img src="images/whatsapp.svg" alt="Whatsapp Icon" width="100">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-square.svg" alt="Instagram Icon" width="100">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="Linkedin Icon" width="100">
            </a>
        </div>
    </footer>
</body>

</html>
